name: "prowl-review"
description: "BYOK AI code review for pull requests — multi-pass review, cross-file context, inline suggestions."
author: "Genkei Labs"
branding:
  icon: "eye"
  color: "purple"

inputs:
  ai-key:
    description: "Provider API key (Anthropic / OpenAI / Gemini). Pass a secret."
    required: true
  ai-provider:
    description: "LLM provider for the Action: anthropic | openai | gemini. Defaults to anthropic; set this input to change providers."
    required: false
    default: "anthropic"
  ai-model:
    description: "Optional model override (per-provider default otherwise)."
    required: false
    default: ""
  config-path:
    description: "Explicit trusted .prowl-review.yml path. Leave empty to ignore repo config in the Action."
    required: false
    default: ""
  min-severity:
    description: "Drop findings below this severity (critical|major|minor|trivial|info)."
    required: false
    default: ""
  dry-run:
    description: "Build the review but do not publish it."
    required: false
    default: "false"
  workspace-path:
    description: "Repository checkout used for context lookup (defaults to GITHUB_WORKSPACE)."
    required: false
    default: ""
  guidelines-path:
    description: "Explicit trusted checkout used to load REVIEW_GUIDELINES.md/CLAUDE.md/LEARNED_PATTERNS.md for repository-level guidance; omit to disable repository guidelines (org-guidelines-path still applies)."
    required: false
    default: ""
  org-guidelines-path:
    description: "Optional trusted path to an org-wide guidelines file injected into every repo's review (added to per-repo guidelines)."
    required: false
    default: ""
  trust-workspace:
    description: "Allow repo-local linter/SAST tools to execute in workspace-path. Disabled automatically for fork PR events; use only for trusted checkouts."
    required: false
    default: "false"
  github-token:
    description: "Token used to post the review (needs pull-requests: write and issues: write)."
    required: false
    default: ${{ github.token }}
  mode:
    description: "What to run: 'review' (default) for a PR review, or 'command' to handle an @prowl-review comment (#26)."
    required: false
    default: "review"

outputs:
  findings:
    description: "Number of findings produced by the review."
    value: ${{ steps.review.outputs.findings }}
  posted:
    description: "Whether the review was posted to GitHub."
    value: ${{ steps.review.outputs.posted }}

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: 20

    - name: Install & build prowl-review
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci && npm run build

    - name: Run prowl-review
      id: review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PROWL_AI_KEY: ${{ inputs.ai-key }}
        PROWL_AI_PROVIDER: ${{ inputs.ai-provider }}
        PROWL_AI_MODEL: ${{ inputs.ai-model }}
        PROWL_CONFIG_PATH: ${{ inputs.config-path }}
        PROWL_NO_CONFIG: ${{ inputs.config-path == '' }}
        PROWL_MIN_SEVERITY: ${{ inputs.min-severity }}
        PROWL_DRY_RUN: ${{ inputs.dry-run }}
        PROWL_WORKSPACE: ${{ inputs.workspace-path }}
        PROWL_GUIDELINES_WORKSPACE: ${{ inputs.guidelines-path }}
        PROWL_ORG_GUIDELINES_PATH: ${{ inputs.org-guidelines-path }}
        PROWL_TRUST_WORKSPACE: ${{ inputs.trust-workspace }}
        PROWL_REVIEWED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      # 'review' reviews the PR; 'command' handles an @prowl-review comment (#26).
      run: node "${{ github.action_path }}/dist/cli.js" "${{ inputs.mode == 'command' && 'command' || 'review' }}"
