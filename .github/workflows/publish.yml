name: publish

# Tag-triggered release (#42): on a `v*` tag, build + lint + test, publish to npm
# with provenance, and create a GitHub Release from the matching CHANGELOG section.
# Requires an `NPM_TOKEN` repository secret (an npm automation token).
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # npm publish --provenance (OIDC)

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "${tag_version}" != "${pkg_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${tag_version}) does not match package.json version ${pkg_version}." >&2
            exit 1
          fi
          echo "version=${pkg_version}" >> "$GITHUB_OUTPUT"
        id: version

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes
        run: node scripts/changelog-section.mjs "${{ steps.version.outputs.version }}" > RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md
