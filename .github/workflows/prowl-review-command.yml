name: prowl-review command

# Handle @prowl-review chat commands + questions on pull requests (#26, #27).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Serialize commands with auto reviews for the same PR so review publishing and
# inline finding dedupe cannot race. Keep command runs queued instead of
# replacing pending maintainer requests. The PR number comes from `issue`
# (issue_comment) or `pull_request` (pull_request_review_comment).
concurrency:
  group: prowl-review-${{ github.event.issue.number || github.event.pull_request.number }}
  queue: max
  cancel-in-progress: false

permissions:
  pull-requests: write
  issues: write
  checks: write
  contents: read

jobs:
  command:
    # Only PR comments (top-level or inline) that mention the bot; never plain
    # issue comments or bot comments.
    if: |
      (github.event.issue.pull_request || github.event.pull_request) &&
      github.event.comment.user.type != 'Bot' &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ) &&
      contains(github.event.comment.body, '@prowl-review') &&
      !contains(github.event.comment.body, '<!-- prowl-review:summary -->') &&
      !contains(github.event.comment.body, '<!-- prowl-review:finding ')
    runs-on: ubuntu-latest
    env:
      PROWL_APP_CONFIGURED: ${{ secrets.PROWL_APP_ID != '' && secrets.PROWL_APP_PRIVATE_KEY != '' }}
    steps:
      # Branded identity (#59): mint an App installation token when PROWL_APP_ID
      # is set so the command reply posts as prowl-review[bot] with the App
      # avatar. The env flag is only a boolean; the private key is only handed
      # to the token action. Falls back to github-actions[bot].
      - name: Mint prowl-review app token
        id: app-token
        if: env.PROWL_APP_CONFIGURED == 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547
        with:
          app-id: ${{ secrets.PROWL_APP_ID }}
          private-key: ${{ secrets.PROWL_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write
          permission-checks: write

      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          pr_number="${{ github.event.issue.number || github.event.pull_request.number }}"
          IFS=$'\t' read -r base_sha head_sha head_repo < <(
            gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" --jq '[.base.sha, .head.sha, .head.repo.full_name] | @tsv'
          )
          if [ -z "${base_sha}" ] || [ -z "${head_sha}" ] || [ -z "${head_repo}" ]; then
            echo "Failed to resolve complete PR metadata for #${pr_number}." >&2
            exit 1
          fi
          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"
          echo "head_repo=${head_repo}" >> "$GITHUB_OUTPUT"
          if [ "${head_repo}" = "${GITHUB_REPOSITORY}" ]; then
            echo "trusted_head=true" >> "$GITHUB_OUTPUT"
          else
            echo "trusted_head=false" >> "$GITHUB_OUTPUT"
            echo "Skipping command from fork PR head ${head_repo}."
          fi

      - name: Checkout trusted base (config + guidelines)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ steps.pr.outputs.base_sha }}
          path: prowl-base
          persist-credentials: false

      - name: Check trusted action availability
        id: trusted-action
        shell: bash
        run: |
          action_file=""
          if [ -f prowl-base/action.yml ]; then
            action_file="prowl-base/action.yml"
          elif [ -f prowl-base/action.yaml ]; then
            action_file="prowl-base/action.yaml"
          fi

          if [ -n "${action_file}" ] &&
            grep -Eq '^[[:space:]]{2}mode:' "${action_file}" &&
            grep -q 'inputs.mode' "${action_file}" &&
            grep -q 'ai-key-anthropic' "${action_file}" &&
            grep -q 'ai-key-gemini' "${action_file}"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Trusted base does not support the prowl-review command-mode ensemble yet; skipping command run."
          fi

      - name: Checkout PR head for context
        if: steps.trusted-action.outputs.available == 'true' && steps.pr.outputs.trusted_head == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          path: pr-head
          persist-credentials: false

      - name: prowl-review command
        if: steps.trusted-action.outputs.available == 'true' && steps.pr.outputs.trusted_head == 'true'
        uses: ./prowl-base # external repos use: prowl-tools/prowl-code-review@v1
        env:
          PROWL_REVIEWED_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          PROWL_REVIEWED_HEAD_REPOSITORY: ${{ steps.pr.outputs.head_repo }}
        with:
          mode: command
          # Claude + Gemini ensemble (#53) — same config as auto reviews, so an
          # @prowl-review review command produces the cross-provider result too.
          ai-key-anthropic: ${{ secrets.PROWL_AI_KEY_ANTHROPIC }}
          ai-key-gemini: ${{ secrets.PROWL_AI_KEY_GEMINI }}
          config-path: ${{ github.workspace }}/prowl-base/.prowl-review.yml
          workspace-path: ${{ github.workspace }}/pr-head
          guidelines-path: ${{ github.workspace }}/prowl-base
          # Branded App token when configured; otherwise the default Actions token.
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          bot-login: ${{ steps.app-token.outputs.app-slug != '' && format('{0}[bot]', steps.app-token.outputs.app-slug) || '' }}
