name: prowl-review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Queue auto reviews with manual commands for the same PR so pushes do not
# cancel command side effects; stale-head checks prevent outdated publishes.
concurrency:
  group: prowl-review-${{ github.event.pull_request.number }}
  queue: max
  cancel-in-progress: false

permissions:
  pull-requests: write
  issues: write
  checks: write
  contents: read

jobs:
  review:
    # Skip drafts and forks; forked PRs do not receive provider secrets.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Check trusted action availability
        id: trusted-action
        shell: bash
        run: |
          # Require the base action to support per-provider ensemble keys (#53), so
          # the new workflow never runs against an old base action that would ignore
          # the scoped keys/config and fail on a missing key. Self-bootstraps once
          # this PR merges (the new action.yml + .prowl-review.yml land together on
          # the base branch).
          action_file=""
          if [ -f action.yml ]; then
            action_file="action.yml"
          elif [ -f action.yaml ]; then
            action_file="action.yaml"
          fi

          if [ -n "${action_file}" ] && grep -q 'ai-key-anthropic' "${action_file}"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Trusted base does not support the prowl-review ensemble yet; skipping bootstrap run."
          fi

      - name: Checkout PR head for context
        if: steps.trusted-action.outputs.available == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-head
          persist-credentials: false

      - name: prowl-review
        if: steps.trusted-action.outputs.available == 'true'
        uses: ./ # external repos use: prowl-tools/prowl-code-review@v1
        with:
          # Claude + Gemini ensemble (#53); per-provider keys, models pinned in
          # the trusted base-branch config. Provider/model come from config-path,
          # not inputs, so the primary stays Claude.
          ai-key-anthropic: ${{ secrets.PROWL_AI_KEY_ANTHROPIC }}
          ai-key-gemini: ${{ secrets.PROWL_AI_KEY_GEMINI }}
          config-path: ${{ github.workspace }}/.prowl-review.yml
          workspace-path: ${{ github.workspace }}/pr-head
          guidelines-path: ${{ github.workspace }}
          # min-severity: major
