name: prowl-review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Queue auto reviews with manual commands for the same PR so pushes do not
# cancel command side effects; stale-head checks prevent outdated publishes.
concurrency:
  group: prowl-review-${{ github.event.pull_request.number }}
  queue: max
  cancel-in-progress: false

permissions:
  pull-requests: write
  issues: write
  checks: write
  contents: read

jobs:
  review:
    # Skip drafts and forks; forked PRs do not receive provider secrets.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      # Branded identity (#59): mint an App installation token when PROWL_APP_ID
      # is set so the review posts as prowl-review[bot] with the App avatar.
      # Read the secret via env (secrets aren't available in a step `if:`) and
      # gate the token step on the result; falls back to github-actions[bot].
      - name: Detect branded app config
        id: brand
        shell: bash
        env:
          APP_ID: ${{ secrets.PROWL_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.PROWL_APP_PRIVATE_KEY }}
        run: |
          if [ -n "${APP_ID}" ] && [ -n "${APP_PRIVATE_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint prowl-review app token
        id: app-token
        if: steps.brand.outputs.enabled == 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547
        with:
          app-id: ${{ secrets.PROWL_APP_ID }}
          private-key: ${{ secrets.PROWL_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write
          permission-checks: write

      - name: Checkout trusted base (config + guidelines)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: prowl-base
          persist-credentials: false

      - name: Check trusted action availability
        id: trusted-action
        shell: bash
        run: |
          # Require the base action to support per-provider ensemble keys (#53), so
          # the new workflow never runs against an old base action that would ignore
          # the scoped keys/config and fail on a missing key. Self-bootstraps once
          # this PR merges (the new action.yml + .prowl-review.yml land together on
          # the base branch).
          action_file=""
          if [ -f prowl-base/action.yml ]; then
            action_file="prowl-base/action.yml"
          elif [ -f prowl-base/action.yaml ]; then
            action_file="prowl-base/action.yaml"
          fi

          if [ -n "${action_file}" ] &&
            grep -q 'ai-key-anthropic' "${action_file}" &&
            grep -q 'ai-key-gemini' "${action_file}"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Trusted base does not support the prowl-review ensemble yet; skipping bootstrap run."
          fi

      - name: Checkout PR head for context
        if: steps.trusted-action.outputs.available == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-head
          persist-credentials: false

      - name: prowl-review
        if: steps.trusted-action.outputs.available == 'true'
        uses: ./prowl-base # external repos use: prowl-tools/prowl-code-review@v1
        with:
          # Claude + Gemini ensemble (#53); per-provider keys, models pinned in
          # the trusted base-branch config. Provider/model come from config-path,
          # not inputs, so the primary stays Claude.
          ai-key-anthropic: ${{ secrets.PROWL_AI_KEY_ANTHROPIC }}
          ai-key-gemini: ${{ secrets.PROWL_AI_KEY_GEMINI }}
          config-path: ${{ github.workspace }}/prowl-base/.prowl-review.yml
          workspace-path: ${{ github.workspace }}/pr-head
          guidelines-path: ${{ github.workspace }}/prowl-base
          # Branded App token when configured; otherwise the default Actions token.
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          bot-login: ${{ steps.app-token.outputs.app-slug != '' && format('{0}[bot]', steps.app-token.outputs.app-slug) || '' }}
          # min-severity: major
