name: prowl-review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Cancel a superseded review when new commits arrive on the same PR.
concurrency:
  group: prowl-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  checks: write
  contents: read

jobs:
  review:
    # Skip drafts and forks; forked PRs do not receive provider secrets.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: prowl-review
        uses: ./ # external repos use: prowl-tools/prowl-code-review@v1
        with:
          ai-key: ${{ secrets.PROWL_AI_KEY }}
          ai-provider: gemini
          # min-severity: major
