# prowl-review dogfoods itself with a multi-provider ensemble (#53): every PR is
# reviewed by Claude and Gemini at once, with findings consolidated and a 🤝
# consensus badge on issues both models flag. Loaded by the workflows via a
# trusted base-branch `config-path` (never the PR checkout).
#
# Cheap, priced models on both sides so the CI cost line shows real dollars
# (mirrors the prior gemini-2.5-flash dogfood choice); bump per-provider `model`
# for a higher-fidelity review.
provider: anthropic            # primary — also runs the shared cross-file context pass (#4)
model: claude-haiku-4-5        # pin the primary/context pass to the cheap dogfood model
ensemble:
  enabled: true
  providers:
    - provider: anthropic
      model: claude-haiku-4-5
    - provider: gemini
      model: gemini-2.5-flash

# Fill an empty PR description from the diff (#33); never overwrites a body you wrote.
prDescription:
  enabled: true

# Validate the PR against its linked issue's acceptance criteria (#32); only acts
# when a PR links an issue (e.g. "Closes #12").
issueValidation:
  enabled: true

# Publish the review as a Checks API check run (#24) so it appears as its own
# branded row in the PR checks list (raccoon avatar via the #59 App token).
# Informational only: no `failOn`, so the conclusion is always neutral — it shows
# severity counts but never fails or blocks a merge. Add `failOn: major` to gate.
checkRun:
  enabled: true

# Survive sustained provider overload by falling back to an older same-family
# model (#17); only triggers after retries are exhausted on a retryable error.
resilience:
  failback:
    enabled: true
